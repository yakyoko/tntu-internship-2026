name: Build and test Projects
on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/Projects.Api/**'
      - 'src/Projects.Api.Tests/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/Projects.Api/**'
      - 'src/Projects.Api.Tests/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/Projects.Api/Projects.Api.csproj
    - name: Build
      run: dotnet build src/Projects.Api/Projects.Api.csproj --no-restore
    - name: Test
      run: dotnet test src/Projects.Api.Tests/Projects.Api.Tests.csproj --no-build --verbosity normal
